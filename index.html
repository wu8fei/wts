<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>wu8的中国火车模拟器（WCTS）</title>
    <style>
        :root {
            --bg: #0a0a0f;
            --lever-track-w: clamp(30px, 3.8vw, 42px);
            --lever-handle-w: clamp(38px, 5vw, 54px);
            --lever-handle-h: clamp(34px, 5.5vh, 56px);
        }
        * { margin:0; padding:0; box-sizing:border-box; }
        body { background: var(--bg); overflow: hidden; font-family: 'PingFang SC','Microsoft YaHei','Helvetica Neue',sans-serif; cursor: grab; user-select: none; -webkit-user-select: none; -webkit-tap-highlight-color: transparent; height: 100vh; width: 100vw; touch-action: none; }
        body.grabbing { cursor: grabbing; }
        #canvas-container { position: fixed; inset: 0; z-index: 1; }
        canvas { display: block; }
        .lever-container { position: fixed; z-index: 30; pointer-events: auto; touch-action: none; display: flex; flex-direction: column; align-items: center; bottom: 20%; top: 6%; width: var(--lever-track-w); }
        #throttle-container { left: clamp(16px, 5vw, 40px); }
        #brake-container { right: clamp(16px, 5vw, 40px); }
        .lever-track { position: relative; width: 100%; height: 100%; background: #3a3a3f; border-radius: calc(var(--lever-track-w) / 2); border: 2px solid rgba(255,255,255,0.1); box-shadow: inset 0 2px 8px rgba(0,0,0,0.5), 0 2px 12px rgba(0,0,0,0.4); overflow: hidden; cursor: pointer; }
        .lever-fill { position: absolute; left:0; right:0; bottom:0; border-radius: 0 0 calc(var(--lever-track-w) / 2 - 2px) calc(var(--lever-track-w) / 2 - 2px); transition: height 0.04s linear, background 0.2s ease; pointer-events: none; }
        #throttle-fill { background: linear-gradient(to top, #e07800, #ff9a30); box-shadow: 0 0 18px rgba(255,140,30,0.45); }
        #brake-fill { background: linear-gradient(to top, #1a5faa, #4499dd); box-shadow: 0 0 18px rgba(60,140,220,0.45); }
        .lever-handle { position: absolute; left:50%; transform: translate(-50%,-50%); width: var(--lever-handle-w); height: var(--lever-handle-h); border-radius: 10px; cursor: grab; pointer-events: auto; touch-action: none; border: 2px solid rgba(255,255,255,0.2); box-shadow: 0 4px 16px rgba(0,0,0,0.5), 0 0 8px rgba(0,0,0,0.3); transition: background 0.18s, box-shadow 0.18s; z-index: 2; }
        .lever-handle:active { cursor: grabbing; }
        #throttle-handle { background: #888; }
        #throttle-handle.active { background: #ff8c1a; box-shadow: 0 4px 22px rgba(255,140,30,0.6), 0 0 14px rgba(255,120,20,0.35); border-color: rgba(255,200,120,0.5); }
        #brake-handle { background: #888; }
        #brake-handle.active { background: #3388cc; box-shadow: 0 4px 22px rgba(50,130,210,0.6), 0 0 14px rgba(40,110,190,0.35); border-color: rgba(140,190,240,0.5); }
        .lever-label { position: absolute; left:50%; transform: translateX(-50%); pointer-events: none; font-size: clamp(0.6em,1.1vw,0.78em); font-weight: 700; letter-spacing: 2px; color: #ccc; text-shadow: 0 0 8px rgba(0,0,0,0.7); white-space: nowrap; }
        #throttle-label { top: -26px; color: #ffb870; }
        #brake-label { top: -26px; color: #80c0f0; }
        #gauge-wrapper { position: fixed; z-index: 21; pointer-events: none; bottom: 19%; left:50%; transform: translateX(-50%); width: 260px; height: 135px; background: rgba(8,8,14,0.6); backdrop-filter: blur(16px); border-radius: 130px 130px 16px 16px; border: 1px solid rgba(255,255,255,0.12); box-shadow: 0 6px 32px rgba(0,0,0,0.5); display: flex; align-items: flex-end; justify-content: center; overflow: hidden; }
        #gauge-canvas { display: block; width: 260px; height: 135px; }
        #hud { position: fixed; z-index: 20; pointer-events: none; bottom: 7%; left:50%; transform: translateX(-50%); display: flex; gap: 50px; align-items: flex-end; background: rgba(8,8,12,0.55); backdrop-filter: blur(18px); border-radius: 28px; padding: 16px 38px 12px; border: 1px solid rgba(255,255,255,0.13); box-shadow: 0 8px 40px rgba(0,0,0,0.5); }
        .hud-item { text-align: center; color: #fafafa; text-shadow: 0 0 20px rgba(255,255,255,0.3); min-width: 70px; }
        .hud-value { font-size: 3.2em; font-weight: 700; letter-spacing: 2px; line-height: 1; font-family: 'SF Mono','Consolas','Monaco','PingFang SC',monospace; color: #fff; text-shadow: 0 0 28px rgba(180,210,255,0.6); }
        .hud-label { font-size: 0.7em; letter-spacing: 3px; text-transform: uppercase; color: #c8cce0; margin-top: 2px; font-weight: 500; }
        .hud-unit { font-size: 0.5em; font-weight: 400; color: #999; }
        #score-display { color: #ffd966; text-shadow: 0 0 20px rgba(255,220,80,0.7); }
        #info-tip { position: fixed; z-index: 20; top: 28px; left:50%; transform: translateX(-50%); color: #e8e8f0; font-size: 0.9em; letter-spacing: 1px; pointer-events: none; background: rgba(10,10,16,0.6); padding: 8px 24px; border-radius: 24px; backdrop-filter: blur(12px); border: 1px solid rgba(255,255,255,0.1); white-space: nowrap; }
        #info-tip.station-near { color: #ffd966; border-color: rgba(255,200,50,0.4); }
        #info-tip.skip-allowed { color: #80ff80; border-color: rgba(100,255,100,0.5); }
        #info-tip.must-stop { color: #ff9966; border-color: rgba(255,140,80,0.5); }
        #speed-limit-display { position: fixed; z-index: 20; top: 72px; left:50%; transform: translateX(-50%); font-size: 0.85em; font-weight: 600; color: #ffaa33; background: rgba(10,10,16,0.65); backdrop-filter: blur(12px); padding: 6px 22px; border-radius: 20px; border: 1px solid rgba(255,170,50,0.35); box-shadow: 0 4px 18px rgba(0,0,0,0.5); }
        #speed-limit-display.overspeed { color: #ff6666; border-color: rgba(255,80,80,0.7); }
        #speed-limit-display.timeout-warning { color: #ff4444; border-color: rgba(255,60,60,0.8); animation: blink 0.5s infinite; }
        @keyframes blink { 0%,100%{opacity:1} 50%{opacity:0.5} }
        #speed-indicator { position: fixed; z-index: 18; pointer-events: none; top:50%; left:50%; transform: translate(-50%,-50%); width: 120px; height: 120px; border-radius: 50%; border: 2px solid transparent; transition: all 0.5s; opacity: 0; }
        #speed-indicator.warning { border-color: rgba(255,140,40,0.7); opacity: 0.75; box-shadow: 0 0 40px rgba(255,120,30,0.3); }
        #speed-indicator.danger { border-color: rgba(255,50,50,0.8); opacity: 0.9; box-shadow: 0 0 50px rgba(255,30,30,0.4); animation: pulse-danger 0.7s infinite; }
        @keyframes pulse-danger { 0%,100%{box-shadow: 0 0 40px rgba(255,30,30,0.35)} 50%{box-shadow: 0 0 70px rgba(255,50,50,0.65)} }
        @media (max-width: 768px) {
            .hud-value { font-size: 2.2em; }
            #hud { gap: 20px; bottom: 10%; padding: 10px 22px 8px; }
            #info-tip { font-size: 0.75em; top: 16px; }
            #speed-limit-display { top: 54px; font-size: 0.7em; }
            #gauge-wrapper { width: 190px; height: 100px; }
            #gauge-canvas { width: 190px; height: 100px; }
        }
    </style>
</head>
<body>
    <div id="canvas-container"></div>
    <div id="speed-indicator"></div>
    <div class="lever-container" id="throttle-container">
        <span class="lever-label" id="throttle-label">加速</span>
        <div class="lever-track" id="throttle-track">
            <div class="lever-fill" id="throttle-fill" style="height:0%;"></div>
            <div class="lever-handle" id="throttle-handle" style="top:100%;"></div>
        </div>
    </div>
    <div class="lever-container" id="brake-container">
        <span class="lever-label" id="brake-label">刹车</span>
        <div class="lever-track" id="brake-track">
            <div class="lever-fill" id="brake-fill" style="height:0%;"></div>
            <div class="lever-handle" id="brake-handle" style="top:100%;"></div>
        </div>
    </div>
    <div id="gauge-wrapper"><canvas id="gauge-canvas" width="520" height="270"></canvas></div>
    <div id="hud">
        <div class="hud-item"><div class="hud-value" id="speed-display">300</div><div class="hud-label">速度 <span class="hud-unit">km/h</span></div></div>
        <div class="hud-item"><div class="hud-value" id="distance-display">0.0</div><div class="hud-label">里程 <span class="hud-unit">km</span></div></div>
        <div class="hud-item"><div class="hud-value" id="score-display">0</div><div class="hud-label">积分</div></div>
    </div>
    <div id="info-tip">📍 下一站：汗脚站 10000m</div>
    <div id="speed-limit-display">⏱ 限速：-- km/h</div>

    <script type="importmap">
        { "imports": { "three": "https://unpkg.com/three@0.160.0/build/three.module.js" } }
    </script>

    <script type="module">
        import * as THREE from 'three';

        // ==================== 常量 ====================
        const CHUNK_SIZE = 200, OVERLAP = 0.8, BEHIND_CHUNKS = 2, AHEAD_CHUNKS = 6;
        const TRACK_Z_UP = 0, TRACK_Z_DOWN = 7.6;
        const RAIL_OFFSET_Z = 0.72;
        const GROUND_Y = -0.35, BALLAST_Y = 0.05, RAIL_TOP_Y = 0.28;
        const TERRAIN_HALF_WIDTH = 170, TRACK_CLEARANCE = 6.5, BUILDING_CLEARANCE = 14;
        const STATION_NAMES = ['汗脚站', '麻脚站', '雨姐站', '带派站', '杭州站'];
        const PLATFORM_HALF_LENGTH = 280, PLATFORM_Z_OFFSET = 3.8;
        const FIRST_STATION_DISTANCE = 10000, STATION_SPACING = 50000;
        const STOP_THRESHOLD = 0.5, DEPART_THRESHOLD = 3;
        const STOP_COOLDOWN_DIST = 15;
        const RED_DURATION = 39, YELLOW_DURATION = 1;
        const TERRAIN_TYPES = ['grassland', 'desert', 'forest', 'snow'];
        const TERRAIN_RANDOM_OFFSET = Math.floor(Math.random() * 4);

        function getTerrainType(worldX) {
            const seg = Math.floor(worldX / 10000) + TERRAIN_RANDOM_OFFSET;
            return TERRAIN_TYPES[seg % 4];
        }

        // ==================== 场景初始化 ====================
        const container = document.getElementById('canvas-container');
        const renderer = new THREE.WebGLRenderer({ antialias: true, alpha: false, powerPreference: 'high-performance' });
        renderer.setPixelRatio(Math.min(window.devicePixelRatio, 2.5));
        renderer.setSize(window.innerWidth, window.innerHeight);
        renderer.shadowMap.enabled = true;
        renderer.shadowMap.type = THREE.PCFSoftShadowMap;
        renderer.toneMapping = THREE.ACESFilmicToneMapping;
        renderer.toneMappingExposure = 1.15;
        renderer.outputColorSpace = THREE.SRGBColorSpace;
        container.appendChild(renderer.domElement);

        const scene = new THREE.Scene();
        scene.background = new THREE.Color('#b0c8e8');
        scene.fog = new THREE.Fog('#c0d4f0', 200, 800);

        const camera = new THREE.PerspectiveCamera(66, window.innerWidth / window.innerHeight, 0.3, 1400);
        camera.position.set(0, 2.95, TRACK_Z_UP);
        camera.lookAt(30, 2.6, TRACK_Z_UP);

        let cameraYaw = 0, cameraPitch = -0.05;
        const defaultYaw = 0, defaultPitch = -0.05;
        const maxYaw = Math.PI * 0.38, maxPitch = 0.28, minPitch = -0.38;

        const ambientLight = new THREE.AmbientLight('#c0d8f8', 1.7); scene.add(ambientLight);
        const hemisphereLight = new THREE.HemisphereLight('#8db8e8', '#7a9e60', 1.0); scene.add(hemisphereLight);
        const sunLight = new THREE.DirectionalLight('#fffef5', 5.0);
        sunLight.position.set(160, 85, 55);
        sunLight.castShadow = true;
        sunLight.shadow.mapSize.width = 2048; sunLight.shadow.mapSize.height = 2048;
        sunLight.shadow.camera.near = 0.5; sunLight.shadow.camera.far = 550;
        sunLight.shadow.camera.left = -130; sunLight.shadow.camera.right = 130;
        sunLight.shadow.camera.top = 85; sunLight.shadow.camera.bottom = -85;
        sunLight.shadow.bias = -0.00025; sunLight.shadow.normalBias = 0.025;
        scene.add(sunLight); scene.add(sunLight.target);

        // ==================== 材质与几何缓存 ====================
        const matCache = {}; const getMat = (key, fn) => { if (!matCache[key]) matCache[key] = fn(); return matCache[key]; };
        const mGroundGrass = () => getMat('groundGrass', () => new THREE.MeshStandardMaterial({ color: '#5c8e3e', roughness: 0.82, metalness: 0.02 }));
        const mBallast = () => getMat('ballast', () => new THREE.MeshStandardMaterial({ color: '#c8c3ba', roughness: 0.68, metalness: 0.04 }));
        const mRail = () => getMat('rail', () => new THREE.MeshStandardMaterial({ color: '#525156', roughness: 0.3, metalness: 0.88 }));
        const mSleeper = () => getMat('sleeper', () => new THREE.MeshStandardMaterial({ color: '#5e5242', roughness: 0.72, metalness: 0.04 }));
        const mTrunk = () => getMat('trunk', () => new THREE.MeshStandardMaterial({ color: '#7d5d3c', roughness: 0.78, metalness: 0.02 }));
        const mLeavesA = () => getMat('leavesA', () => new THREE.MeshStandardMaterial({ color: '#4d7d32', roughness: 0.68, metalness: 0.01 }));
        const mLeavesB = () => getMat('leavesB', () => new THREE.MeshStandardMaterial({ color: '#3f6b2a', roughness: 0.7, metalness: 0.01 }));
        const mLeavesC = () => getMat('leavesC', () => new THREE.MeshStandardMaterial({ color: '#5c9040', roughness: 0.66, metalness: 0.01 }));
        const mWallA = () => getMat('wallA', () => new THREE.MeshStandardMaterial({ color: '#f6f1e9', roughness: 0.58, metalness: 0.03 }));
        const mWallB = () => getMat('wallB', () => new THREE.MeshStandardMaterial({ color: '#eae3d7', roughness: 0.6, metalness: 0.03 }));
        const mRoofA = () => getMat('roofA', () => new THREE.MeshStandardMaterial({ color: '#8d3c2c', roughness: 0.52, metalness: 0.06 }));
        const mRoofB = () => getMat('roofB', () => new THREE.MeshStandardMaterial({ color: '#5c5242', roughness: 0.55, metalness: 0.08 }));
        const mHillGrassA = () => getMat('hillGrassA', () => new THREE.MeshStandardMaterial({ color: '#6ea048', roughness: 0.72, metalness: 0.02 }));
        const mHillGrassB = () => getMat('hillGrassB', () => new THREE.MeshStandardMaterial({ color: '#9e8d70', roughness: 0.68, metalness: 0.03 }));
        const mHillGrassC = () => getMat('hillGrassC', () => new THREE.MeshStandardMaterial({ color: '#5e7c3a', roughness: 0.76, metalness: 0.02 }));
        const mGroundDesert = () => getMat('groundDesert', () => new THREE.MeshStandardMaterial({ color: '#F6F165', roughness: 0.78, metalness: 0.04 }));
        const mHillDesertA = () => getMat('hillDesertA', () => new THREE.MeshStandardMaterial({ color: '#e8e35a', roughness: 0.7, metalness: 0.05 }));
        const mHillDesertB = () => getMat('hillDesertB', () => new THREE.MeshStandardMaterial({ color: '#dcd650', roughness: 0.65, metalness: 0.06 }));
        const mHillDesertC = () => getMat('hillDesertC', () => new THREE.MeshStandardMaterial({ color: '#f0ed70', roughness: 0.72, metalness: 0.04 }));
        const mGroundForest = () => getMat('groundForest', () => new THREE.MeshStandardMaterial({ color: '#2d5a1e', roughness: 0.78, metalness: 0.02 }));
        const mHillForestA = () => getMat('hillForestA', () => new THREE.MeshStandardMaterial({ color: '#3d6b2a', roughness: 0.7, metalness: 0.03 }));
        const mHillForestB = () => getMat('hillForestB', () => new THREE.MeshStandardMaterial({ color: '#4a7a35', roughness: 0.68, metalness: 0.04 }));
        const mHillForestC = () => getMat('hillForestC', () => new THREE.MeshStandardMaterial({ color: '#56853f', roughness: 0.72, metalness: 0.03 }));
        const mWallDesert = () => getMat('wallDesert', () => new THREE.MeshStandardMaterial({ color: '#F6F165', roughness: 0.65, metalness: 0.05 }));
        const mRoofDesert = () => getMat('roofDesert', () => new THREE.MeshStandardMaterial({ color: '#c4b840', roughness: 0.6, metalness: 0.08 }));
        const mCactus = () => getMat('cactus', () => new THREE.MeshStandardMaterial({ color: '#4a6a2a', roughness: 0.55, metalness: 0.02 }));
        const mBushDesert = () => getMat('bushDesert', () => new THREE.MeshStandardMaterial({ color: '#e8e35a', roughness: 0.7, metalness: 0.03 }));
        const mGroundSnow = () => getMat('groundSnow', () => new THREE.MeshStandardMaterial({ color: '#e8e8f0', roughness: 0.7, metalness: 0.01 }));
        const mHillSnowA = () => getMat('hillSnowA', () => new THREE.MeshStandardMaterial({ color: '#e0e0e8', roughness: 0.68, metalness: 0.02 }));
        const mHillSnowB = () => getMat('hillSnowB', () => new THREE.MeshStandardMaterial({ color: '#d8d8e2', roughness: 0.66, metalness: 0.03 }));
        const mHillSnowC = () => getMat('hillSnowC', () => new THREE.MeshStandardMaterial({ color: '#ececf4', roughness: 0.7, metalness: 0.02 }));
        const mTrunkSnow = () => getMat('trunkSnow', () => new THREE.MeshStandardMaterial({ color: '#4a3a2a', roughness: 0.75, metalness: 0.02 }));
        const mLeavesSnowA = () => getMat('leavesSnowA', () => new THREE.MeshStandardMaterial({ color: '#e8e8f2', roughness: 0.6, metalness: 0.01 }));
        const mLeavesSnowB = () => getMat('leavesSnowB', () => new THREE.MeshStandardMaterial({ color: '#dcdce8', roughness: 0.62, metalness: 0.01 }));
        const mLeavesSnowC = () => getMat('leavesSnowC', () => new THREE.MeshStandardMaterial({ color: '#f0f0f6', roughness: 0.58, metalness: 0.01 }));
        const mWallSnow = () => getMat('wallSnow', () => new THREE.MeshStandardMaterial({ color: '#5c4033', roughness: 0.6, metalness: 0.05 }));
        const mRoofSnow = () => getMat('roofSnow', () => new THREE.MeshStandardMaterial({ color: '#e8e8f0', roughness: 0.5, metalness: 0.04 }));
        const mBushSnow = () => getMat('bushSnow', () => new THREE.MeshStandardMaterial({ color: '#d8d8e4', roughness: 0.68, metalness: 0.02 }));
        const mPlatform = () => getMat('platform', () => new THREE.MeshStandardMaterial({ color: '#c0bab0', roughness: 0.65, metalness: 0.05 }));
        const mStationWall = () => getMat('stationWall', () => new THREE.MeshStandardMaterial({ color: '#e8e0d0', roughness: 0.55, metalness: 0.04 }));
        const mStationRoof = () => getMat('stationRoof', () => new THREE.MeshStandardMaterial({ color: '#7a4030', roughness: 0.5, metalness: 0.06 }));
        const mChair = () => getMat('chair', () => new THREE.MeshStandardMaterial({ color: '#8b7355', roughness: 0.7, metalness: 0.1 }));
        const mSignalPole = () => getMat('signalPole', () => new THREE.MeshStandardMaterial({ color: '#555555', roughness: 0.5, metalness: 0.5 }));
        const mBellows = () => getMat('bellows', () => new THREE.MeshStandardMaterial({ color: '#1a1a1a', roughness: 0.6, metalness: 0.2 }));

        const geoCache = {}; const getGeo = (key, fn) => { if (!geoCache[key]) geoCache[key] = fn(); return geoCache[key]; };
        const railLen = CHUNK_SIZE + OVERLAP;
        const getRailGeo = () => getGeo('rail', () => new THREE.BoxGeometry(railLen, 0.13, 0.06));
        const getBallastGeo = () => getGeo('ballast', () => new THREE.BoxGeometry(railLen + 0.3, 0.22, 3.9));
        const getSlabGeo = () => getGeo('slab', () => new THREE.BoxGeometry(railLen, 0.06, 2.3));
        const getSleeperGeo = () => getGeo('sleeper', () => new THREE.BoxGeometry(0.14, 0.06, 2.65));

        const sr = (seed) => { const x = Math.sin(seed * 127.1 + 311.7) * 43758.5453123; return x - Math.floor(x); };
        const srr = (seed, min, max) => min + sr(seed) * (max - min);
        const sri = (seed, min, max) => Math.floor(srr(seed, min, max + 1));

        // ==================== 车站数据 ====================
        const stations = [];
        function generateStations(count = 30) {
            const pool = [...STATION_NAMES]; let lastX = FIRST_STATION_DISTANCE; let lastName = '';
            for (let i = 0; i < count; i++) {
                let name; do { name = pool[Math.floor(Math.random() * pool.length)]; } while (name === lastName && pool.length > 1);
                lastName = name;
                stations.push({ worldX: lastX, name, platformHalf: PLATFORM_HALF_LENGTH, visited: false, allowSkip: Math.random() < 0.2, signalGroup: null, signalRed: null, signalYellow: null, signalGreen: null, stopPhase: 'none', stopStartTime: 0, hasAwarded: false });
                lastX += STATION_SPACING;
            }
        }
        generateStations();
        let nextStationIndex = 0, score = 0, lastStopX = null, stopCooldownActive = false;
        function getCurrentTargetStation() { return nextStationIndex < stations.length ? stations[nextStationIndex] : null; }
        function isOnPlatform(trainX) { const s = getCurrentTargetStation(); return s ? Math.abs(trainX - s.worldX) < s.platformHalf : false; }

        // 天气系统
        const weatherStates = {
            sunny: { bg: '#b0c8e8', fog: '#c0d4f0', fogNear: 200, fogFar: 800, ambient: '#c0d8f8', ambientIntensity: 1.7, sunColor: '#fffef5', sunIntensity: 5.0 },
            cloudy: { bg: '#8a9bb0', fog: '#a0aab8', fogNear: 150, fogFar: 550, ambient: '#a0b0c0', ambientIntensity: 1.2, sunColor: '#d0d5e0', sunIntensity: 2.5 },
            rainy: { bg: '#4a5568', fog: '#5a6578', fogNear: 100, fogFar: 400, ambient: '#606878', ambientIntensity: 0.9, sunColor: '#8090a0', sunIntensity: 1.5 },
            night: { bg: '#1a1a2e', fog: '#1a1a2e', fogNear: 80, fogFar: 350, ambient: '#2a2a40', ambientIntensity: 0.6, sunColor: '#304060', sunIntensity: 0.5 }
        };
        let currentWeather = 'sunny'; const rainParticles = new THREE.Group(); scene.add(rainParticles);
        function setWeather(weather) {
            const w = weatherStates[weather]; scene.background = new THREE.Color(w.bg); scene.fog = new THREE.Fog(w.fog, w.fogNear, w.fogFar);
            ambientLight.color.set(w.ambient); ambientLight.intensity = w.ambientIntensity; sunLight.color.set(w.sunColor); sunLight.intensity = w.sunIntensity;
            while (rainParticles.children.length > 0) rainParticles.remove(rainParticles.children[0]);
            if (weather === 'rainy') { const rainGeo = new THREE.BufferGeometry(); const rainCount = 800; const positions = new Float32Array(rainCount * 3); for (let i = 0; i < rainCount; i++) { positions[i*3] = (Math.random()-0.5)*300; positions[i*3+1] = Math.random()*60+10; positions[i*3+2] = (Math.random()-0.5)*200; } rainGeo.setAttribute('position', new THREE.BufferAttribute(positions, 3)); rainParticles.add(new THREE.Points(rainGeo, new THREE.PointsMaterial({ color: '#aaccff', size: 0.25, transparent: true, opacity: 0.4 }))); }
            currentWeather = weather;
        }
        let gameTime = 0; const SIM_DAY = 1440; let lastAutoMinute = -1;

        window.addEventListener('mouseup',()=>{if(activeLever)return;if(isDragging){isDragging=false;document.body.classList.remove('grabbing');}});
        canvas.addEventListener('touchstart',e=>{if(activeLever)return;if(e.touches.length===1){isDragging=true;prevMouseX=e.touches[0].clientX;prevMouseY=e.touches[0].clientY;document.body.classList.add('grabbing');}},{passive:false});
        window.addEventListener('touchmove',e=>{if(activeLever)return;if(!isDragging||e.touches.length!==1)return;const dx=e.touches[0].clientX-prevMouseX,dy=e.touches[0].clientY-prevMouseY;cameraYaw-=dx*0.0028;cameraPitch-=dy*0.0028;prevMouseX=e.touches[0].clientX;prevMouseY=e.touches[0].clientY;},{passive:false});
        window.addEventListener('touchend',()=>{if(activeLever)return;if(isDragging){isDragging=false;document.body.classList.remove('grabbing');}});
        window.addEventListener('keydown',e=>{if(e.key==='1')setWeather('sunny');if(e.key==='2')setWeather('cloudy');if(e.key==='3')setWeather('rainy');if(e.key==='4')setWeather('night');if(e.code==='Space'){e.preventDefault();isPaused=!isPaused;}if(e.code==='KeyW'){targetSpeedKmh=Math.min(maxSpeedKmh,targetSpeedKmh+12);if(activeLever!=='throttle'){throttlePosition=targetSpeedKmh/maxSpeedKmh;updateLeverUI('throttle');}}if(e.code==='KeyS'){targetSpeedKmh=Math.max(minSpeedKmh,targetSpeedKmh-12);if(activeLever!=='throttle'){throttlePosition=targetSpeedKmh/maxSpeedKmh;updateLeverUI('throttle');}}if(e.code==='KeyR'){cameraYaw=defaultYaw;cameraPitch=defaultPitch;}if(e.code==='ArrowUp'){targetSpeedKmh=Math.min(maxSpeedKmh,targetSpeedKmh+5);if(activeLever!=='throttle'){throttlePosition=targetSpeedKmh/maxSpeedKmh;updateLeverUI('throttle');}}if(e.code==='ArrowDown'){targetSpeedKmh=Math.max(minSpeedKmh,targetSpeedKmh-5);if(activeLever!=='throttle'){throttlePosition=targetSpeedKmh/maxSpeedKmh;updateLeverUI('throttle');}}});
        window.addEventListener('wheel',e=>{if(activeLever)return;e.preventDefault();targetSpeedKmh=THREE.MathUtils.clamp(targetSpeedKmh+(e.deltaY>0?-6:6),minSpeedKmh,maxSpeedKmh);if(activeLever!=='throttle'){throttlePosition=targetSpeedKmh/maxSpeedKmh;updateLeverUI('throttle');}},{passive:false});
        window.addEventListener('resize',()=>{camera.aspect=window.innerWidth/window.innerHeight;camera.updateProjectionMatrix();renderer.setSize(window.innerWidth,window.innerHeight);updateLeverUI('both');});
        function updateSunPosition(){sunLight.position.x=trainPositionX+140;sunLight.position.y=80;sunLight.position.z=48;sunLight.target.position.copy(camera.position);sunLight.target.position.x+=35;sunLight.target.updateMatrixWorld();}
        const clock=new THREE.Clock();let lastChunkUpdateX=trainPositionX;
        const speedIndicator=document.getElementById('speed-indicator'),speedDisplay=document.getElementById('speed-display'),distanceDisplay=document.getElementById('distance-display'),scoreDisplay=document.getElementById('score-display'),infoTip=document.getElementById('info-tip'),speedLimitDisplay=document.getElementById('speed-limit-display');
        let overrideMessage=null,elapsedSimTime=0;

        function animate(){
            requestAnimationFrame(animate);const dt=Math.min(clock.getDelta(),0.18);
            if(!isPaused&&dt>0){elapsedSimTime+=dt;gameTime+=dt;if(brakePosition>0.02){speedKmh=Math.max(0,speedKmh-brakePosition*MAX_BRAKE_DECEL*dt);if(speedKmh<0.5)speedKmh=0;targetSpeedKmh=0;if(activeLever!=='throttle'){throttlePosition=0;updateLeverUI('throttle');}}else if(activeLever!=='throttle')targetSpeedKmh=throttlePosition*maxSpeedKmh;if(brakePosition<0.02){const diff=targetSpeedKmh-speedKmh;const acc=getMaxAccel(speedKmh,diff>0);speedKmh+=Math.abs(diff)<acc*dt?diff:Math.sign(diff)*acc*dt;}trainPositionX+=speedKmh/3.6*dt;totalDistanceKm+=speedKmh/3600*dt;updateAITrain(dt);if(currentWeather==='rainy'){rainParticles.position.copy(camera.position);rainParticles.position.y-=5;}updateAutoWeather();}
            if(activeLever!=='throttle'&&brakePosition<0.02&&!isPaused){const synced=targetSpeedKmh/maxSpeedKmh;if(Math.abs(throttlePosition-synced)>0.005){throttlePosition=synced;updateLeverUI('throttle');}}
            speedIndicator.className=speedKmh>380?'danger':speedKmh>330?'warning':'';camera.position.x=trainPositionX;camera.position.y=2.95;camera.position.z=TRACK_Z_UP;updateCameraLook();
            if(Math.abs(trainPositionX-lastChunkUpdateX)>28){updateChunks(trainPositionX);distantMountains.position.x=trainPositionX;lastChunkUpdateX=trainPositionX;}
            updateSunPosition();handleStationStop();handleNonStationStop();handleSkipStation();handleSpeedLimit(dt);
            speedDisplay.textContent=Math.round(speedKmh);distanceDisplay.textContent=totalDistanceKm.toFixed(1);scoreDisplay.textContent=score;drawGauge(speedKmh);
            const ns=getCurrentTargetStation();if(overrideMessage){infoTip.textContent=overrideMessage;infoTip.classList.add('station-near');infoTip.classList.remove('skip-allowed','must-stop');}else if(ns){const dist=Math.round(ns.worldX-trainPositionX);const si=ns.allowSkip?' 🟢必跨站':' 🔴必停';infoTip.textContent=`📍 下一站：${ns.name}  ${dist>0?dist:0}m${si}`;infoTip.classList.add('station-near');infoTip.classList.toggle('skip-allowed',ns.allowSkip);infoTip.classList.toggle('must-stop',!ns.allowSkip);}else{infoTip.textContent='🏁 终点站';infoTip.classList.remove('station-near','skip-allowed','must-stop');}
            scene.fog.far=speedKmh>360?620:speedKmh>260?750:880;renderer.render(scene,camera);
        }
        updateChunks(trainPositionX);lastChunkUpdateX=trainPositionX;updateSunPosition();distantMountains.position.x=trainPositionX;spawnAITrain();requestAnimationFrame(animate);
        console.log('🚄 WCTS 车头长度加倍、森林树叶加大、车厢连接优化');
    </script>
</body>
</html>
