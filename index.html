<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>wu8的中国火车模拟器（WCTS）</title>
    <style>
        :root { --bg: #0a0a0f; }
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body { background: var(--bg); overflow: hidden; font-family: 'PingFang SC','Microsoft YaHei','Helvetica Neue',sans-serif; cursor: grab; user-select: none; -webkit-user-select: none; -webkit-tap-highlight-color: transparent; height: 100vh; width: 100vw; touch-action: none; }
        body.grabbing { cursor: grabbing; }
        #canvas-container { position: fixed; inset: 0; z-index: 1; }
        canvas { display: block; }
        #gauge-wrapper { position: fixed; z-index: 21; pointer-events: none; bottom: 19%; left: 50%; transform: translateX(-50%); width: 260px; height: 135px; background: rgba(8,8,14,0.6); backdrop-filter: blur(16px); -webkit-backdrop-filter: blur(16px); border-radius: 130px 130px 16px 16px; border: 1px solid rgba(255,255,255,0.12); box-shadow: 0 6px 32px rgba(0,0,0,0.5), inset 0 1px 0 rgba(255,255,255,0.04); display: flex; align-items: flex-end; justify-content: center; overflow: hidden; }
        #gauge-canvas { display: block; width: 260px; height: 135px; }
        #hud { position: fixed; z-index: 20; pointer-events: none; bottom: 7%; left: 50%; transform: translateX(-50%); display: flex; gap: 50px; align-items: flex-end; background: rgba(8,8,12,0.55); backdrop-filter: blur(18px); -webkit-backdrop-filter: blur(18px); border-radius: 28px; padding: 16px 38px 12px; border: 1px solid rgba(255,255,255,0.13); box-shadow: 0 8px 40px rgba(0,0,0,0.5), inset 0 1px 0 rgba(255,255,255,0.04); }
        .hud-item { text-align: center; color: #fafafa; text-shadow: 0 0 20px rgba(255,255,255,0.3); min-width: 70px; }
        .hud-value { font-size: 3.2em; font-weight: 700; letter-spacing: 2px; line-height: 1; font-variant-numeric: tabular-nums; font-family: 'SF Mono','Consolas','Monaco','PingFang SC',monospace; color: #ffffff; text-shadow: 0 0 28px rgba(180,210,255,0.6),0 2px 4px rgba(0,0,0,0.4); }
        .hud-label { font-size: 0.7em; letter-spacing: 3px; text-transform: uppercase; color: #c8cce0; margin-top: 2px; font-weight: 500; }
        .hud-unit { font-size: 0.5em; font-weight: 400; color: #999; letter-spacing: 1px; }
        #score-display { color: #ffd966; text-shadow: 0 0 20px rgba(255,220,80,0.7); }
        #info-tip { position: fixed; z-index: 20; top: 28px; left: 50%; transform: translateX(-50%); color: #e8e8f0; font-size: 0.9em; letter-spacing: 1px; pointer-events: none; text-shadow: 0 0 12px rgba(0,0,0,0.8); transition: opacity 0.8s ease, color 0.3s; background: rgba(10,10,16,0.6); padding: 8px 24px; border-radius: 24px; backdrop-filter: blur(12px); -webkit-backdrop-filter: blur(12px); border: 1px solid rgba(255,255,255,0.1); white-space: nowrap; text-align: center; }
        #info-tip.station-near { color: #ffd966; border-color: rgba(255,200,50,0.4); background: rgba(20,15,5,0.7); }
        #speed-indicator { position: fixed; z-index: 18; pointer-events: none; top: 50%; left: 50%; transform: translate(-50%,-50%); width: 120px; height: 120px; border-radius: 50%; border: 2px solid transparent; transition: all 0.5s ease; opacity: 0; }
        #speed-indicator.warning { border-color: rgba(255,140,40,0.7); opacity: 0.75; box-shadow: 0 0 40px rgba(255,120,30,0.3); }
        #speed-indicator.danger { border-color: rgba(255,50,50,0.8); opacity: 0.9; box-shadow: 0 0 50px rgba(255,30,30,0.4); animation: pulse-danger 0.7s ease-in-out infinite; }
        @keyframes pulse-danger { 0%,100% { box-shadow: 0 0 40px rgba(255,30,30,0.35); } 50% { box-shadow: 0 0 70px rgba(255,50,50,0.65); } }
        @media (max-width: 768px) { .hud-value { font-size: 2.2em; } #hud { gap: 20px; bottom: 10%; padding: 10px 22px 8px; border-radius: 22px; } #info-tip { font-size: 0.75em; padding: 5px 14px; top: 16px; } #speed-indicator { width: 80px; height: 80px; } #gauge-wrapper { bottom: 22%; width: 190px; height: 100px; border-radius: 95px 95px 12px 12px; } #gauge-canvas { width: 190px; height: 100px; } }
    </style>
</head>
<body>
    <div id="canvas-container"></div>
    <div id="speed-indicator"></div>
    <div id="gauge-wrapper"><canvas id="gauge-canvas" width="520" height="270"></canvas></div>
    <div id="hud">
        <div class="hud-item"><div class="hud-value" id="speed-display">300</div><div class="hud-label">速度 <span class="hud-unit">km/h</span></div></div>
        <div class="hud-item"><div class="hud-value" id="distance-display">0.0</div><div class="hud-label">里程 <span class="hud-unit">km</span></div></div>
        <div class="hud-item"><div class="hud-value" id="score-display">0</div><div class="hud-label">积分</div></div>
    </div>
    <div id="info-tip">📍 下一站：汗脚站 10000m</div>

    <script type="importmap">
        { "imports": { "three": "https://unpkg.com/three@0.160.0/build/three.module.js" } }
    </script>

    <script type="module">
        import * as THREE from 'three';

        // ==================== 常量 ====================
        const CHUNK_SIZE = 200, OVERLAP = 0.8, BEHIND_CHUNKS = 2, AHEAD_CHUNKS = 6;
        const TRACK_Z_UP = 0, TRACK_Z_DOWN = 7.6;
        const RAIL_OFFSET_Z = 0.72;
        const GROUND_Y = -0.35, BALLAST_Y = 0.05, RAIL_TOP_Y = 0.28;
        const TERRAIN_HALF_WIDTH = 170, TRACK_CLEARANCE = 6.5, BUILDING_CLEARANCE = 14;

        const STATION_NAMES = ['汗脚站', '麻脚站', '雨姐站', '带派站', '杭州站'];
        const PLATFORM_HALF_LENGTH = 155, PLATFORM_Z_OFFSET = 3.8;
        const FIRST_STATION_DISTANCE = 10000, STATION_SPACING = 50000;
        const STOP_THRESHOLD = 0.5, DEPART_THRESHOLD = 3;
        const STOP_COOLDOWN_DIST = 15;
        const RED_DURATION = 39, YELLOW_DURATION = 1;

        // ==================== 场景初始化 ====================
        const container = document.getElementById('canvas-container');
        const renderer = new THREE.WebGLRenderer({ antialias: true, alpha: false, powerPreference: 'high-performance' });
        renderer.setPixelRatio(Math.min(window.devicePixelRatio, 2.5));
        renderer.setSize(window.innerWidth, window.innerHeight);
        renderer.shadowMap.enabled = true;
        renderer.shadowMap.type = THREE.PCFSoftShadowMap;
        renderer.toneMapping = THREE.ACESFilmicToneMapping;
        renderer.toneMappingExposure = 1.15;
        renderer.outputColorSpace = THREE.SRGBColorSpace;
        container.appendChild(renderer.domElement);

        const scene = new THREE.Scene();
        scene.background = new THREE.Color('#b0c8e8');
        scene.fog = new THREE.Fog('#c0d4f0', 200, 800);

        const camera = new THREE.PerspectiveCamera(66, window.innerWidth / window.innerHeight, 0.3, 1400);
        camera.position.set(0, 2.95, TRACK_Z_UP);
        camera.lookAt(30, 2.6, TRACK_Z_UP);

        let cameraYaw = 0, cameraPitch = -0.05;
        const defaultYaw = 0, defaultPitch = -0.05;
        const maxYaw = Math.PI * 0.38, maxPitch = 0.28, minPitch = -0.38;

        const ambientLight = new THREE.AmbientLight('#c0d8f8', 1.7);
        scene.add(ambientLight);
        const hemisphereLight = new THREE.HemisphereLight('#8db8e8', '#7a9e60', 1.0);
        scene.add(hemisphereLight);
        const sunLight = new THREE.DirectionalLight('#fffef5', 5.0);
        sunLight.position.set(160, 85, 55);
        sunLight.castShadow = true;
        sunLight.shadow.mapSize.width = 2048; sunLight.shadow.mapSize.height = 2048;
        sunLight.shadow.camera.near = 0.5; sunLight.shadow.camera.far = 550;
        sunLight.shadow.camera.left = -130; sunLight.shadow.camera.right = 130;
        sunLight.shadow.camera.top = 85; sunLight.shadow.camera.bottom = -85;
        sunLight.shadow.bias = -0.00025; sunLight.shadow.normalBias = 0.025;
        scene.add(sunLight); scene.add(sunLight.target);

        // ==================== 材质与几何缓存 ====================
        const matCache = {};
        const getMat = (key, fn) => { if (!matCache[key]) matCache[key] = fn(); return matCache[key]; };
        const mGround = () => getMat('ground', () => new THREE.MeshStandardMaterial({ color: '#5c8e3e', roughness: 0.82, metalness: 0.02 }));
        const mBallast = () => getMat('ballast', () => new THREE.MeshStandardMaterial({ color: '#c8c3ba', roughness: 0.68, metalness: 0.04 }));
        const mRail = () => getMat('rail', () => new THREE.MeshStandardMaterial({ color: '#525156', roughness: 0.3, metalness: 0.88 }));
        const mSleeper = () => getMat('sleeper', () => new THREE.MeshStandardMaterial({ color: '#5e5242', roughness: 0.72, metalness: 0.04 }));
        const mPole = () => getMat('pole', () => new THREE.MeshStandardMaterial({ color: '#8e8e88', roughness: 0.48, metalness: 0.62 }));
        const mTrunk = () => getMat('trunk', () => new THREE.MeshStandardMaterial({ color: '#7d5d3c', roughness: 0.78, metalness: 0.02 }));
        const mLeavesA = () => getMat('leavesA', () => new THREE.MeshStandardMaterial({ color: '#4d7d32', roughness: 0.68, metalness: 0.01 }));
        const mLeavesB = () => getMat('leavesB', () => new THREE.MeshStandardMaterial({ color: '#3f6b2a', roughness: 0.7, metalness: 0.01 }));
        const mLeavesC = () => getMat('leavesC', () => new THREE.MeshStandardMaterial({ color: '#5c9040', roughness: 0.66, metalness: 0.01 }));
        const mWallA = () => getMat('wallA', () => new THREE.MeshStandardMaterial({ color: '#f6f1e9', roughness: 0.58, metalness: 0.03 }));
        const mWallB = () => getMat('wallB', () => new THREE.MeshStandardMaterial({ color: '#eae3d7', roughness: 0.6, metalness: 0.03 }));
        const mRoofA = () => getMat('roofA', () => new THREE.MeshStandardMaterial({ color: '#8d3c2c', roughness: 0.52, metalness: 0.06 }));
        const mRoofB = () => getMat('roofB', () => new THREE.MeshStandardMaterial({ color: '#5c5242', roughness: 0.55, metalness: 0.08 }));
        const mHillA = () => getMat('hillA', () => new THREE.MeshStandardMaterial({ color: '#6ea048', roughness: 0.72, metalness: 0.02 }));
        const mHillB = () => getMat('hillB', () => new THREE.MeshStandardMaterial({ color: '#9e8d70', roughness: 0.68, metalness: 0.03 }));
        const mHillC = () => getMat('hillC', () => new THREE.MeshStandardMaterial({ color: '#5e7c3a', roughness: 0.76, metalness: 0.02 }));
        const mPlatform = () => getMat('platform', () => new THREE.MeshStandardMaterial({ color: '#c0bab0', roughness: 0.65, metalness: 0.05 }));
        const mStationWall = () => getMat('stationWall', () => new THREE.MeshStandardMaterial({ color: '#e8e0d0', roughness: 0.55, metalness: 0.04 }));
        const mStationRoof = () => getMat('stationRoof', () => new THREE.MeshStandardMaterial({ color: '#7a4030', roughness: 0.5, metalness: 0.06 }));
        const mChair = () => getMat('chair', () => new THREE.MeshStandardMaterial({ color: '#8b7355', roughness: 0.7, metalness: 0.1 }));
        const mSignalPole = () => getMat('signalPole', () => new THREE.MeshStandardMaterial({ color: '#555555', roughness: 0.5, metalness: 0.5 }));

        const geoCache = {};
        const getGeo = (key, fn) => { if (!geoCache[key]) geoCache[key] = fn(); return geoCache[key]; };
        const railLen = CHUNK_SIZE + OVERLAP;
        const getRailGeo = () => getGeo('rail', () => new THREE.BoxGeometry(railLen, 0.13, 0.06));
        const getBallastGeo = () => getGeo('ballast', () => new THREE.BoxGeometry(railLen + 0.3, 0.22, 3.9));
        const getSlabGeo = () => getGeo('slab', () => new THREE.BoxGeometry(railLen, 0.06, 2.3));
        const getSleeperGeo = () => getGeo('sleeper', () => new THREE.BoxGeometry(0.14, 0.06, 2.65));
        const getTrunkGeo = () => getGeo('trunk', () => new THREE.CylinderGeometry(0.07, 0.15, 3.8, 9, 4));
        const getConeGeo = () => getGeo('cone', () => new THREE.ConeGeometry(2.4, 5.8, 10, 3));
        const getConeSmallGeo = () => getGeo('coneSmall', () => new THREE.ConeGeometry(1.6, 4.0, 8, 3));
        const getSphereGeo = () => getGeo('sphereLeaf', () => new THREE.SphereGeometry(1.9, 10, 6));
        const getSphereSmallGeo = () => getGeo('sphereSmall', () => new THREE.SphereGeometry(1.3, 8, 5));

        const sr = (seed) => { const x = Math.sin(seed * 127.1 + 311.7) * 43758.5453123; return x - Math.floor(x); };
        const srr = (seed, min, max) => min + sr(seed) * (max - min);
        const sri = (seed, min, max) => Math.floor(srr(seed, min, max + 1));

        // ==================== 车站数据 ====================
        const stations = [];
        function generateStations(count = 30) {
            const pool = [...STATION_NAMES];
            let lastX = FIRST_STATION_DISTANCE;
            let lastName = '';
            for (let i = 0; i < count; i++) {
                let name;
                do { name = pool[Math.floor(Math.random() * pool.length)]; } while (name === lastName && pool.length > 1);
                lastName = name;
                stations.push({
                    worldX: lastX, name, platformHalf: PLATFORM_HALF_LENGTH, visited: false,
                    signalGroup: null, signalRed: null, signalYellow: null, signalGreen: null,
                    stopPhase: 'none', stopStartTime: 0, hasAwarded: false
                });
                lastX += STATION_SPACING;
            }
        }
        generateStations();
        let nextStationIndex = 0, score = 0, lastStopX = null, stopCooldownActive = false;
        function getCurrentTargetStation() { return nextStationIndex < stations.length ? stations[nextStationIndex] : null; }
        function isOnPlatform(trainX) { const s = getCurrentTargetStation(); return s ? Math.abs(trainX - s.worldX) < s.platformHalf : false; }

        // 天气系统
        const weatherStates = {
            sunny:  { bg: '#b0c8e8', fog: '#c0d4f0', fogNear: 200, fogFar: 800, ambient: '#c0d8f8', ambientIntensity: 1.7, sunColor: '#fffef5', sunIntensity: 5.0 },
            cloudy: { bg: '#8a9bb0', fog: '#a0aab8', fogNear: 150, fogFar: 550, ambient: '#a0b0c0', ambientIntensity: 1.2, sunColor: '#d0d5e0', sunIntensity: 2.5 },
            rainy:  { bg: '#4a5568', fog: '#5a6578', fogNear: 100, fogFar: 400, ambient: '#606878', ambientIntensity: 0.9, sunColor: '#8090a0', sunIntensity: 1.5 },
            night:  { bg: '#1a1a2e', fog: '#1a1a2e', fogNear: 80,  fogFar: 350, ambient: '#2a2a40', ambientIntensity: 0.6, sunColor: '#304060', sunIntensity: 0.5 }
        };
        let currentWeather = 'sunny';
        const rainParticles = new THREE.Group();
        scene.add(rainParticles);

        function setWeather(weather) {
            const w = weatherStates[weather];
            scene.background = new THREE.Color(w.bg);
            scene.fog = new THREE.Fog(w.fog, w.fogNear, w.fogFar);
            ambientLight.color.set(w.ambient);
            ambientLight.intensity = w.ambientIntensity;
            sunLight.color.set(w.sunColor);
            sunLight.intensity = w.sunIntensity;
            while(rainParticles.children.length > 0) rainParticles.remove(rainParticles.children[0]);
            if (weather === 'rainy') {
                const rainGeo = new THREE.BufferGeometry();
                const rainCount = 800;
                const positions = new Float32Array(rainCount * 3);
                for (let i = 0; i < rainCount; i++) {
                    positions[i*3] = (Math.random() - 0.5) * 300;
                    positions[i*3+1] = Math.random() * 60 + 10;
                    positions[i*3+2] = (Math.random() - 0.5) * 200;
                }
                rainGeo.setAttribute('position', new THREE.BufferAttribute(positions, 3));
                const rainMat = new THREE.PointsMaterial({ color: '#aaccff', size: 0.25, transparent: true, opacity: 0.4 });
                rainParticles.add(new THREE.Points(rainGeo, rainMat));
            }
            currentWeather = weather;
        }

        let gameTime = 0;
        const SIM_DAY = 1440;
        let lastAutoMinute = -1;

        function updateAutoWeather() {
            if (isPaused) return;
            const currentMinute = Math.floor(gameTime / 60);
            if (currentMinute === lastAutoMinute) return;
            lastAutoMinute = currentMinute;
            const dayProgress = gameTime % SIM_DAY;
            if (dayProgress < 720) {
                const w = Math.random() > 0.5 ? 'sunny' : 'rainy';
                setWeather(w);
            } else if (dayProgress < 960) {
                setWeather('cloudy');
            } else {
                setWeather('night');
            }
        }

        // AI列车系统
        const aiTrains = [];
        let aiSpawnTimer = 0;
        const AI_SPAWN_INTERVAL = 35;

        function createAITrainModel() {
            const group = new THREE.Group();
            const bodyMat = new THREE.MeshStandardMaterial({ color: '#f5f5f5', roughness: 0.35, metalness: 0.6 });
            const blueLineMat = new THREE.MeshStandardMaterial({ color: '#3a6fb5', roughness: 0.5, metalness: 0.5, emissive: '#000810', emissiveIntensity: 0.1 });
            const glassMat = new THREE.MeshStandardMaterial({ color: '#556666', roughness: 0.15, metalness: 0.4, transparent: true, opacity: 0.7 });
            const wheelGeo = new THREE.CylinderGeometry(0.25, 0.25, 0.1, 16);
            const wheelMat = new THREE.MeshStandardMaterial({ color: '#222222', roughness: 0.4, metalness: 0.8 });

            const headBody = new THREE.Mesh(new THREE.BoxGeometry(2.8, 1.25, 1.9), bodyMat);
            headBody.position.set(0, 0.65, 0); headBody.castShadow = true; headBody.receiveShadow = true;
            group.add(headBody);
            for (let x = -1.0; x <= 1.0; x += 2.0) {
                for (let z = -0.8; z <= 0.8; z += 1.6) {
                    const wheel = new THREE.Mesh(wheelGeo, wheelMat);
                    wheel.rotation.x = Math.PI / 2; wheel.position.set(x, -0.25, z);
                    wheel.castShadow = true; wheel.receiveShadow = true; headBody.add(wheel);
                }
            }

            const wedgeShape = new THREE.Shape();
            wedgeShape.moveTo(0, 0); wedgeShape.lineTo(0, 1.0); wedgeShape.lineTo(1.2, 0.3); wedgeShape.lineTo(1.2, 0); wedgeShape.closePath();
            const wedgeGeo = new THREE.ExtrudeGeometry(wedgeShape, { depth: 1.6, bevelEnabled: false });
            const wedge = new THREE.Mesh(wedgeGeo, bodyMat);
            wedge.position.set(1.4, -0.02, -0.8); wedge.castShadow = true; wedge.receiveShadow = true; group.add(wedge);

            const blueStrip = new THREE.Mesh(new THREE.BoxGeometry(2.6, 0.05, 0.12), blueLineMat);
            blueStrip.position.set(0.5, 0.35, 0.95); group.add(blueStrip);
            const blueStrip2 = new THREE.Mesh(new THREE.BoxGeometry(2.6, 0.05, 0.12), blueLineMat);
            blueStrip2.position.set(0.5, 0.35, -0.95); group.add(blueStrip2);
            const wedgeBlue1 = new THREE.Mesh(new THREE.BoxGeometry(0.8, 0.04, 0.1), blueLineMat);
            wedgeBlue1.position.set(2.0, 0.35, 0.95); group.add(wedgeBlue1);
            const wedgeBlue2 = new THREE.Mesh(new THREE.BoxGeometry(0.8, 0.04, 0.1), blueLineMat);
            wedgeBlue2.position.set(2.0, 0.35, -0.95); group.add(wedgeBlue2);

            for (let i = 0; i < 3; i++) {
                const carBody = new THREE.Mesh(new THREE.BoxGeometry(4.2, 1.1, 1.7), bodyMat);
                carBody.position.set(-(i+1)*4.5, 0.58, 0); carBody.castShadow = true; carBody.receiveShadow = true; group.add(carBody);
                for (let x = -1.5; x <= 1.5; x += 3.0) {
                    for (let z = -0.75; z <= 0.75; z += 1.5) {
                        const wheel = new THREE.Mesh(wheelGeo, wheelMat);
                        wheel.rotation.x = Math.PI / 2; wheel.position.set(x, -0.25, z);
                        wheel.castShadow = true; wheel.receiveShadow = true; carBody.add(wheel);
                    }
                }
                for (let w = -0.7; w <= 0.7; w += 1.4) {
                    const window = new THREE.Mesh(new THREE.BoxGeometry(0.5, 0.4, 0.12), glassMat);
                    window.position.set(-(i+1)*4.5 + 0.3, 0.95, w * 1.4); group.add(window);
                }
                const line1 = new THREE.Mesh(new THREE.BoxGeometry(4.0, 0.04, 0.1), blueLineMat);
                line1.position.set(-(i+1)*4.5, 0.28, 0.85); group.add(line1);
                const line2 = new THREE.Mesh(new THREE.BoxGeometry(4.0, 0.04, 0.1), blueLineMat);
                line2.position.set(-(i+1)*4.5, 0.28, -0.85); group.add(line2);
            }
            group.scale.set(3, 3, 3);
            return group;
        }

        function spawnAITrain() {
            const trackZ = TRACK_Z_DOWN;
            const spawnX = trainPositionX + 900 + Math.random()*400;
            const speed = 280 + Math.random()*80;
            const model = createAITrainModel();
            model.position.set(spawnX, 0, trackZ); model.rotation.y = Math.PI;
            scene.add(model);
            aiTrains.push({ group: model, speed, direction: -1, trackZ });
        }

        function updateAITrains(dt) {
            for (let i=aiTrains.length-1; i>=0; i--) {
                const t = aiTrains[i];
                t.group.position.x += t.speed/3.6 * dt * t.direction;
                if (Math.abs(t.group.position.x - trainPositionX) > 1200) { scene.remove(t.group); aiTrains.splice(i,1); }
            }
        }

        // 椅子、信号灯、车站
        function createChair() {
            const group = new THREE.Group();
            const sw=0.55, sd=0.50, st=0.06, lh=0.48, ls=0.11, bw=0.55, bh=0.52, bt=0.06;
            const mat = mChair();
            const seat = new THREE.Mesh(new THREE.BoxGeometry(sw,st,sd), mat);
            seat.position.y = lh+st/2; seat.castShadow=true; seat.receiveShadow=true; group.add(seat);
            const legGeo = new THREE.BoxGeometry(ls,lh,ls);
            const offX = sw/2-ls/2-0.03, offZ = sd/2-ls/2-0.03;
            [[-offX,lh/2,-offZ],[offX,lh/2,-offZ],[-offX,lh/2,offZ],[offX,lh/2,offZ]].forEach(([x,y,z]) => {
                const leg = new THREE.Mesh(legGeo, mat); leg.position.set(x,y,z); leg.castShadow=true; leg.receiveShadow=true; group.add(leg);
            });
            const back = new THREE.Mesh(new THREE.BoxGeometry(bw,bh,bt), mat);
            back.position.set(0, lh+st+bh/2, -sd/2+bt/2+0.02); back.castShadow=true; back.receiveShadow=true; group.add(back);
            group.scale.set(2,2,2);
            return group;
        }

        function createSignalLight() {
            const group = new THREE.Group();
            const pole = new THREE.Mesh(new THREE.CylinderGeometry(0.1,0.14,5.5,8), mSignalPole());
            pole.position.y = GROUND_Y+2.75; pole.castShadow=true; pole.receiveShadow=true; group.add(pole);
            const housing = new THREE.Mesh(new THREE.BoxGeometry(0.7,2.2,0.2), new THREE.MeshStandardMaterial({ color:'#3a3a3a', roughness:0.4, metalness:0.6 }));
            housing.position.y = GROUND_Y+5.3; housing.position.z = -0.15; housing.castShadow=true; group.add(housing);
            const lightGeo = new THREE.SphereGeometry(0.22,16,8);

        function createStationMesh(station) {

                bush.position.set(bx, GROUND_Y+srr(bSeed+400,0.35,1.0), bz);

            // ★★★ 草 ★★★

                const side = sr(seedBase + 50100 + i) > 0.5 ? 1 : -1;

            const grassMat = new THREE.LineBasicMaterial({ vertexColors: true });

        function createRailTrack(chunkGroup, chunkStartX, trackZ) {
            const tg = new THREE.Group();
            const midX = chunkStartX + CHUNK_SIZE/2;
            const ballast = new THREE.Mesh(getBallastGeo(), mBallast());
            ballast.position.set(midX, BALLAST_Y-0.11, trackZ); ballast.castShadow=true; ballast.receiveShadow=true; tg.add(ballast);
            const slab = new THREE.Mesh(getSlabGeo(), new THREE.MeshStandardMaterial({ color:'#bab5ac', roughness:0.58, metalness:0.07 }));
            slab.position.set(midX, BALLAST_Y+0.04, trackZ); slab.receiveShadow=true; tg.add(slab);
            const sleeperGeo = getSleeperGeo(), sleeperMat = mSleeper();
            for (let i=0; i<=Math.floor(CHUNK_SIZE/1.6); i++) {
                const sx = chunkStartX + i*1.6; if (sx > chunkStartX+CHUNK_SIZE) break;
                const sleeper = new THREE.Mesh(sleeperGeo, sleeperMat);
                sleeper.position.set(sx, BALLAST_Y+0.07, trackZ); sleeper.castShadow=true; sleeper.receiveShadow=true; tg.add(sleeper);
            }
            const railGeo = getRailGeo(), railMat = mRail();
            for (let side=-1; side<=1; side+=2) {
                const rail = new THREE.Mesh(railGeo, railMat);
                rail.position.set(midX, RAIL_TOP_Y, trackZ + side*RAIL_OFFSET_Z);
                rail.castShadow=true; rail.receiveShadow=true; tg.add(rail);
            }
            chunkGroup.add(tg);
        }

        const activeChunks = new Map();
        function getChunkIndex(wx) { return Math.floor(wx / CHUNK_SIZE); }
        function getChunkStartX(idx) { return idx * CHUNK_SIZE; }
        function removeChunk(idx, group) {
            scene.remove(group);
            group.traverse(child => {
                if (child.geometry && !Object.values(geoCache).includes(child.geometry)) child.geometry.dispose();
                if (child.material) {
                    const mats = Array.isArray(child.material) ? child.material : [child.material];
                    mats.forEach(m => { if (m && !Object.values(matCache).includes(m) && typeof m.dispose === 'function') m.dispose(); });
                }
            });
        }
        function generateChunk(chunkIndex) {
            const chunkStartX = getChunkStartX(chunkIndex);
            const chunkGroup = new THREE.Group(); chunkGroup.name = `chunk-${chunkIndex}`;
            const midX = chunkStartX + CHUNK_SIZE/2;
            const ground = new THREE.Mesh(new THREE.PlaneGeometry(CHUNK_SIZE+OVERLAP+2, TERRAIN_HALF_WIDTH*2+8), mGround());
            ground.rotation.x = -Math.PI/2; ground.position.set(midX, GROUND_Y, 0); ground.receiveShadow=true; chunkGroup.add(ground);
            createRailTrack(chunkGroup, chunkStartX, TRACK_Z_UP);
            createRailTrack(chunkGroup, chunkStartX, TRACK_Z_DOWN);
            createTerrainFeatures(chunkGroup, chunkStartX, chunkIndex);
            const chunkMinX = chunkStartX, chunkMaxX = chunkStartX + CHUNK_SIZE;
            for (const station of stations) {
                if (station.worldX >= chunkMinX && station.worldX < chunkMaxX) {
                    chunkGroup.add(createStationMesh(station));
                }
            }
            scene.add(chunkGroup); return chunkGroup;
        }
        function updateChunks(camX) {
            const currentIdx = getChunkIndex(camX);
            const minChunk = currentIdx - BEHIND_CHUNKS, maxChunk = currentIdx + AHEAD_CHUNKS;
            for (const [idx, group] of activeChunks) {
                if (idx < minChunk || idx > maxChunk) { removeChunk(idx, group); activeChunks.delete(idx); }
            }
            for (let i = minChunk; i <= maxChunk; i++) {
                if (!activeChunks.has(i)) activeChunks.set(i, generateChunk(i));
            }
        }

        function createDistantMountains() {
            const mg = new THREE.Group(); mg.name = 'distant-mountains';
            for (let i=0; i<18; i++) {
                const seed = 90000+i; const mRadius = srr(seed,35,90);
                const mz = TRACK_Z_UP + (sr(seed+200)>0.5?1:-1)*srr(seed+300,90,TERRAIN_HALF_WIDTH+60);
                const flat = srr(seed+400,0.2,0.45);
                const mGeo = new THREE.SphereGeometry(mRadius,20,10,0,Math.PI*2,0,Math.PI/2.3);
                const pos = mGeo.attributes.position;
                for (let vi=0; vi<pos.count; vi++) { const y=pos.getY(vi); if(y>0) pos.setY(vi,y*flat); }
                mGeo.computeVertexNormals();
                const m = new THREE.Mesh(mGeo, [mHillB(),mHillC(),mHillA()][sri(seed+500,0,2)]);
                m.position.set(srr(seed+100,-400,1400), GROUND_Y-mRadius*flat*0.2, mz);
                m.castShadow=true; m.receiveShadow=true; mg.add(m);

            scene.add(mg); return mg;
        }
        const distantMountains = createDistantMountains();

        // ==================== 全局状态 ====================
        let trainPositionX = 0, speedKmh = 300, targetSpeedKmh = 300, isPaused = false, totalDistanceKm = 0;
        const maxSpeedKmh = 420, minSpeedKmh = 0;
        function getMaxAccel(s, acc) {
            const abs = Math.abs(s); let a;
            if (abs<50) a=25; else if (abs<150) a=15; else if (abs<250) a=8; else if (abs<350) a=4; else a=2;
            return acc ? a : a*1.3;
        }

        // 仪表盘
        const gaugeCanvas = document.getElementById('gauge-canvas');
        const gaugeCtx = gaugeCanvas.getContext('2d');
        const gaugeW=520, gaugeH=270, gaugeCx=260, gaugeCy=255, gaugeRadius=210;
        function drawGauge(speed) {
            const ctx = gaugeCtx, cx=gaugeCx, cy=gaugeCy, r=gaugeRadius;
            ctx.clearRect(0,0,gaugeW,gaugeH);
            ctx.save(); ctx.beginPath(); ctx.arc(cx,cy,r+14,Math.PI,0); ctx.lineTo(cx+r+14,cy); ctx.lineTo(cx-r-14,cy); ctx.closePath();
            const bgGrad = ctx.createRadialGradient(cx,cy,r*0.5,cx,cy,r+14);
            bgGrad.addColorStop(0,'rgba(22,22,30,0.85)'); bgGrad.addColorStop(1,'rgba(10,10,16,0.92)');
            ctx.fillStyle=bgGrad; ctx.fill(); ctx.restore();
            const arcThick=22, arcR=r-6;
            [{s:0,e:150,c:'#4caf50'},{s:150,e:300,c:'#ffc107'},{s:300,e:380,c:'#ff9800'},{s:380,e:420,c:'#f44336'}].forEach(seg=>{
                ctx.beginPath(); ctx.arc(cx,cy,arcR,Math.PI-(seg.s/420)*Math.PI,Math.PI-(seg.e/420)*Math.PI);
                ctx.strokeStyle=seg.c; ctx.lineWidth=arcThick; ctx.stroke();
            });
            const tickOuterR = r-arcThick-6;
            for (let i=0;i<=42;i++) {
                const sv=i*10, angle=Math.PI-(sv/420)*Math.PI, isMajor=sv%50===0;
                const innerR=isMajor?tickOuterR-30:tickOuterR-18;
                const cosA=Math.cos(angle), sinA=Math.sin(angle);
                ctx.beginPath(); ctx.moveTo(cx+cosA*tickOuterR,cy-sinA*tickOuterR); ctx.lineTo(cx+cosA*innerR,cy-sinA*innerR);
                ctx.strokeStyle=isMajor?'#e0e0e0':'rgba(200,200,210,0.5)'; ctx.lineWidth=isMajor?2.5:1.2; ctx.stroke();
                if (isMajor&&sv<=420) {
                    const lx=cx+cosA*(innerR-22), ly=cy-sinA*(innerR-22);
                    ctx.fillStyle='#e8e8f0'; ctx.font='bold 20px "PingFang SC","Microsoft YaHei",sans-serif'; ctx.textAlign='center'; ctx.textBaseline='middle'; ctx.fillText(sv,lx,ly);
                }
            }
            const sc=Math.min(Math.max(speed,0),420);
            const pAngle=Math.PI-(sc/420)*Math.PI, pLen=r-55;
            const pTipX=cx+Math.cos(pAngle)*pLen, pTipY=cy-Math.sin(pAngle)*pLen;
            ctx.save(); ctx.beginPath(); ctx.moveTo(cx-10,cy); ctx.lineTo(pTipX,pTipY); ctx.lineTo(cx+10,cy); ctx.closePath();
            ctx.fillStyle='rgba(0,0,0,0.35)'; ctx.fill(); ctx.restore();
            const pGrad=ctx.createLinearGradient(cx,cy,pTipX,pTipY);
            pGrad.addColorStop(0,'#ff3b3b'); pGrad.addColorStop(1,'#ff6b6b');
            ctx.beginPath(); ctx.moveTo(cx-8,cy); ctx.lineTo(pTipX,pTipY); ctx.lineTo(cx+8,cy); ctx.closePath();
            ctx.fillStyle=pGrad; ctx.fill(); ctx.strokeStyle='#cc2020'; ctx.lineWidth=2; ctx.stroke();
            const cGrad=ctx.createRadialGradient(cx,cy,6,cx,cy,22);
            cGrad.addColorStop(0,'#ffffff'); cGrad.addColorStop(0.5,'#e0e0e0'); cGrad.addColorStop(1,'#888888');
            ctx.beginPath(); ctx.arc(cx,cy,22,0,Math.PI*2); ctx.fillStyle=cGrad; ctx.fill(); ctx.strokeStyle='#555'; ctx.lineWidth=2; ctx.stroke();
            ctx.beginPath(); ctx.arc(cx,cy,10,0,Math.PI*2); ctx.fillStyle='#d00'; ctx.fill();
            ctx.fillStyle='#ffffff'; ctx.font='bold 52px "SF Mono","Consolas","Monaco","PingFang SC",monospace'; ctx.textAlign='center'; ctx.textBaseline='middle';
            ctx.fillText(Math.round(sc),cx,cy-48);
            ctx.fillStyle='#aaa'; ctx.font='18px "PingFang SC","Microsoft YaHei",sans-serif'; ctx.fillText('km/h',cx,cy-12);
        }

        function updateSignalLights(station, phase) {
            if (!station?.signalRedMat) return;
            const r=station.signalRedMat, y=station.signalYellowMat, g=station.signalGreenMat;
            switch(phase) {
                case 'red': r.color.set('#ff2020'); r.emissive.set('#ff0000'); r.emissiveIntensity=1.2; y.color.set('#cc6600'); y.emissive.set('#331100'); y.emissiveIntensity=0.3; g.color.set('#0a3a0a'); g.emissive.set('#001a00'); g.emissiveIntensity=0.3; break;
                case 'yellow': r.color.set('#4a1010'); r.emissive.set('#1a0000'); r.emissiveIntensity=0.3; y.color.set('#ffff00'); y.emissive.set('#ffcc00'); y.emissiveIntensity=1.2; g.color.set('#0a3a0a'); g.emissive.set('#001a00'); g.emissiveIntensity=0.3; break;
                case 'green': r.color.set('#4a1010'); r.emissive.set('#1a0000'); r.emissiveIntensity=0.3; y.color.set('#cc6600'); y.emissive.set('#331100'); y.emissiveIntensity=0.3; g.color.set('#40ff40'); g.emissive.set('#00ff00'); g.emissiveIntensity=1.2; break;
                default: r.color.set('#4a1010'); r.emissive.set('#1a0000'); r.emissiveIntensity=0.3; y.color.set('#cc6600'); y.emissive.set('#331100'); y.emissiveIntensity=0.3; g.color.set('#0a3a0a'); g.emissive.set('#001a00'); g.emissiveIntensity=0.3;
            }
        }

        // 摄像机控制
        let isDragging=false, prevMouseX=0, prevMouseY=0;
        function updateCameraLook() {
            if (!isDragging) { cameraYaw += (-defaultYaw-cameraYaw)*0.035; cameraPitch += (defaultPitch-cameraPitch)*0.035; }
            cameraYaw = THREE.MathUtils.clamp(cameraYaw, -maxYaw, maxYaw);
            cameraPitch = THREE.MathUtils.clamp(cameraPitch, minPitch, maxPitch);
            const lookDir = new THREE.Vector3(1,0,0);
            lookDir.applyAxisAngle(new THREE.Vector3(0,1,0), cameraYaw);
            lookDir.applyAxisAngle(new THREE.Vector3(0,0,1), cameraPitch);
            lookDir.normalize();
            camera.lookAt(camera.position.x + lookDir.x*60, camera.position.y + lookDir.y*60, camera.position.z + lookDir.z*60);
        }
        const canvas = renderer.domElement;
        canvas.addEventListener('mousedown', (e) => { if (e.button===0||e.button===2) { isDragging=true; prevMouseX=e.clientX; prevMouseY=e.clientY; document.body.classList.add('grabbing'); } });
        window.addEventListener('mousemove', (e) => { if (!isDragging) return; const dx=e.clientX-prevMouseX, dy=e.clientY-prevMouseY; const s=0.0028; cameraYaw-=dx*s; cameraPitch-=dy*s; prevMouseX=e.clientX; prevMouseY=e.clientY; });
        window.addEventListener('mouseup', () => { if (isDragging) { isDragging=false; document.body.classList.remove('grabbing'); } });
        canvas.addEventListener('touchstart', (e) => { if (e.touches.length===1) { isDragging=true; prevMouseX=e.touches[0].clientX; prevMouseY=e.touches[0].clientY; document.body.classList.add('grabbing'); } }, {passive:false});
        window.addEventListener('touchmove', (e) => { if (!isDragging||e.touches.length!==1) return; const dx=e.touches[0].clientX-prevMouseX, dy=e.touches[0].clientY-prevMouseY; const s=0.0028; cameraYaw-=dx*s; cameraPitch-=dy*s; prevMouseX=e.touches[0].clientX; prevMouseY=e.touches[0].clientY; }, {passive:false});
        window.addEventListener('touchend', () => { if (isDragging) { isDragging=false; document.body.classList.remove('grabbing'); } });

        window.addEventListener('keydown', (e) => {
            if (e.key==='1') setWeather('sunny');
            if (e.key==='2') setWeather('cloudy');
            if (e.key==='3') setWeather('rainy');
            if (e.key==='4') setWeather('night');
            if (e.code==='Space') { e.preventDefault(); isPaused=!isPaused; }
            if (e.code==='KeyW') targetSpeedKmh=Math.min(maxSpeedKmh, targetSpeedKmh+12);
            if (e.code==='KeyS') targetSpeedKmh=Math.max(minSpeedKmh, targetSpeedKmh-12);
            if (e.code==='KeyR') { cameraYaw=defaultYaw; cameraPitch=defaultPitch; }
            if (e.code==='ArrowUp') targetSpeedKmh=Math.min(maxSpeedKmh, targetSpeedKmh+5);
            if (e.code==='ArrowDown') targetSpeedKmh=Math.max(minSpeedKmh, targetSpeedKmh-5);
        });
        window.addEventListener('wheel', (e) => { e.preventDefault(); targetSpeedKmh=THREE.MathUtils.clamp(targetSpeedKmh+(e.deltaY>0?-6:6), minSpeedKmh, maxSpeedKmh); }, {passive:false});
        window.addEventListener('resize', () => { camera.aspect=window.innerWidth/window.innerHeight; camera.updateProjectionMatrix(); renderer.setSize(window.innerWidth, window.innerHeight); });

        function updateSunPosition() {
            sunLight.position.x = trainPositionX + 140;
            sunLight.position.y = 80; sunLight.position.z = 48;
            sunLight.target.position.copy(camera.position); sunLight.target.position.x += 35;
            sunLight.target.updateMatrixWorld();
        }

        const clock = new THREE.Clock();
        let lastChunkUpdateX = trainPositionX;
        const speedIndicator = document.getElementById('speed-indicator');
        const speedDisplay = document.getElementById('speed-display');
        const distanceDisplay = document.getElementById('distance-display');
        const scoreDisplay = document.getElementById('score-display');
        const infoTip = document.getElementById('info-tip');
        let overrideMessage = null, elapsedSimTime = 0;

        function setOverrideMessage(msg, dur=3000) {
            overrideMessage=msg;
            setTimeout(()=>{ if(overrideMessage===msg) overrideMessage=null; }, dur);
        }

        function handleStationStop() {
            if (isPaused) return;
            const station = getCurrentTargetStation();
            if (!station) return;
            const onPlatform = isOnPlatform(trainPositionX);
            const isStopped = speedKmh < STOP_THRESHOLD;
            const isMoving = speedKmh >= DEPART_THRESHOLD;

            if (onPlatform && isStopped) {
                if (station.stopPhase === 'none' && !station.hasAwarded) {
                    station.stopPhase = 'red'; station.stopStartTime = elapsedSimTime; station.hasAwarded = false;
                    updateSignalLights(station, 'red');
                    setOverrideMessage(`🔴 ${station.name} 停车，等待40秒...`, 2500);
                }
            }
            if (station.stopPhase === 'red') {
                if (elapsedSimTime - station.stopStartTime >= RED_DURATION) {
                    station.stopPhase = 'yellow'; updateSignalLights(station, 'yellow');
                    setOverrideMessage(`🟡 ${station.name} 即将发车...`, 1500);
                }
            }
            if (station.stopPhase === 'yellow') {
                if (elapsedSimTime - station.stopStartTime >= RED_DURATION + YELLOW_DURATION) {
                    station.stopPhase = 'green'; updateSignalLights(station, 'green');
                    setOverrideMessage(`🟢 ${station.name} 可以发车！`, 3000);
                }
            }
            if (onPlatform && isMoving) {
                if (station.stopPhase === 'green' && !station.hasAwarded) {
                    score += 20; station.hasAwarded = true; station.visited = true; nextStationIndex++;
                    setOverrideMessage(`✅ 停靠 ${station.name} +20分`, 3000);
                    updateSignalLights(station, 'none'); station.stopPhase = 'none'; station.stopStartTime = 0;
                    lastStopX = trainPositionX; stopCooldownActive = true;
                } else if (station.stopPhase !== 'green' && station.stopPhase !== 'none' && !station.hasAwarded) {
                    score -= 20; station.hasAwarded = true; station.visited = true; nextStationIndex++;
                    setOverrideMessage(`⚠️ 闯红灯！${station.name} -20分`, 3000);
                    updateSignalLights(station, 'none'); station.stopPhase = 'none'; station.stopStartTime = 0;
                    lastStopX = trainPositionX; stopCooldownActive = true;
                }
            }
        }

        function handleNonStationStop() {
            if (isPaused) return;
            const station = getCurrentTargetStation();
            const onPlatform = station ? isOnPlatform(trainPositionX) : false;
            const isStopped = speedKmh < STOP_THRESHOLD;
            if (isStopped && !onPlatform) {
                const cooldownPassed = (lastStopX === null || Math.abs(trainPositionX - lastStopX) > STOP_COOLDOWN_DIST || !stopCooldownActive);
                if (cooldownPassed) {
                    score -= 20; stopCooldownActive = true; lastStopX = trainPositionX;
                    setOverrideMessage('⚠️ 非站台停车 -20分', 2500);
                }
            }
            if (speedKmh > STOP_THRESHOLD && stopCooldownActive && Math.abs(trainPositionX - (lastStopX || 0)) > STOP_COOLDOWN_DIST) {
                stopCooldownActive = false;
            }
        }

        function handleSkipStation() {
            if (isPaused) return;
            const station = getCurrentTargetStation();
            if (!station) return;
            if (trainPositionX > station.worldX + station.platformHalf && !station.visited) {
                station.visited = true; station.hasAwarded = true; nextStationIndex++;
                score -= 20;
                setOverrideMessage(`⚠️ 跨站 ${station.name} -20分`, 3000);
                updateSignalLights(station, 'none'); station.stopPhase = 'none';
            }
        }

        function animate() {
            requestAnimationFrame(animate);
            const dt = Math.min(clock.getDelta(), 0.18);
            if (!isPaused && dt>0) {
                elapsedSimTime += dt;
                gameTime += dt;
                const diff = targetSpeedKmh - speedKmh;
                const acc = getMaxAccel(speedKmh, diff>0);
                speedKmh += Math.abs(diff) < acc*dt ? diff : Math.sign(diff)*acc*dt;
                trainPositionX += (speedKmh/3.6)*dt;
                totalDistanceKm += (speedKmh/3600)*dt;
                aiSpawnTimer += dt;
                if (aiSpawnTimer >= AI_SPAWN_INTERVAL) { aiSpawnTimer=0; spawnAITrain(); }
                updateAITrains(dt);
                if (currentWeather==='rainy') { rainParticles.position.copy(camera.position); rainParticles.position.y -= 5; }
                updateAutoWeather();
            }
            if (speedKmh>380) speedIndicator.className='danger';
            else if (speedKmh>330) speedIndicator.className='warning';
            else speedIndicator.className='';
            camera.position.x = trainPositionX; camera.position.y = 2.95; camera.position.z = TRACK_Z_UP;
            updateCameraLook();
            if (Math.abs(trainPositionX - lastChunkUpdateX) > 28) {
                updateChunks(trainPositionX); distantMountains.position.x = trainPositionX; lastChunkUpdateX = trainPositionX;
            }
            updateSunPosition();
            handleStationStop();
            handleNonStationStop();
            handleSkipStation();
            speedDisplay.textContent = Math.round(speedKmh);
            distanceDisplay.textContent = totalDistanceKm.toFixed(1);
            scoreDisplay.textContent = score;
            drawGauge(speedKmh);
            const nextStation = getCurrentTargetStation();
            if (overrideMessage) {
                infoTip.textContent = overrideMessage;
                infoTip.classList.add('station-near');
            } else if (nextStation) {
                const dist = Math.round(nextStation.worldX - trainPositionX);
                infoTip.textContent = `📍 下一站：${nextStation.name}  ${dist>0 ? dist : 0}m`;
                infoTip.classList.add('station-near');
            } else {
                infoTip.textContent = '🏁 终点站';
                infoTip.classList.remove('station-near');
            }
            if (speedKmh>360) scene.fog.far=620;
            else if (speedKmh>260) scene.fog.far=750;
            else scene.fog.far=880;
            renderer.render(scene, camera);
        }

        updateChunks(trainPositionX); lastChunkUpdateX = trainPositionX;
        updateSunPosition(); distantMountains.position.x = trainPositionX;
        requestAnimationFrame(animate);
        console.log('🚄 wu8的中国火车模拟器（WCTS）已启动');
    </script>
</body>
</html>
